<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Clicker</title>

<style>
*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:Arial,sans-serif;
}

body{
	height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	background:
	radial-gradient(circle at top,#242424,#0d0d0d 70%);
	color:white;
	overflow:hidden;
}

#game{
	width:380px;
	background:rgba(20,20,20,0.95);
	border:2px solid rgba(255,255,255,0.05);
	border-radius:20px;
	padding:25px;
	box-shadow:
	0 0 25px rgba(0,0,0,0.6),
	0 0 60px rgba(0,255,150,0.08);
	text-align:center;
	backdrop-filter:blur(10px);
}

h1{
	font-size:32px;
	margin-bottom:15px;
	color:#00ff99;
	text-shadow:0 0 12px rgba(0,255,153,0.5);
}

#points{
	font-size:42px;
	font-weight:bold;
	margin-top:5px;
	color:#ffffff;
}

.stats{
	display:flex;
	justify-content:space-between;
	margin-top:18px;
	background:#111;
	padding:12px;
	border-radius:12px;
	font-size:14px;
}

.stat{
	width:50%;
}

.label{
	color:#888;
	font-size:12px;
}

.value{
	font-size:18px;
	margin-top:4px;
	color:#00ff99;
}

#clickBtn{
	width:100%;
	margin-top:22px;
	padding:20px;
	font-size:24px;
	font-weight:bold;
	border:none;
	border-radius:16px;
	cursor:pointer;
	background:linear-gradient(135deg,#00ff99,#00c3ff);
	color:black;
	transition:0.12s;
	box-shadow:0 0 20px rgba(0,255,153,0.25);
}

#clickBtn:hover{
	transform:translateY(-2px);
	box-shadow:0 0 30px rgba(0,255,153,0.45);
}

#clickBtn:active{
	transform:scale(0.95);
}

.shop{
	margin-top:24px;
	text-align:left;
}

.shop h2{
	font-size:20px;
	margin-bottom:12px;
	color:#fff;
}

.upgrade{
	display:flex;
	justify-content:space-between;
	align-items:center;
	background:#151515;
	border:1px solid rgba(255,255,255,0.05);
	padding:14px;
	border-radius:14px;
	margin-bottom:12px;
	transition:0.15s;
}

.upgrade:hover{
	transform:translateY(-2px);
	background:#1c1c1c;
}

.upgrade-info strong{
	font-size:16px;
}

.upgrade-info p{
	font-size:12px;
	color:#999;
	margin-top:4px;
}

.upgrade button{
	border:none;
	padding:10px 16px;
	border-radius:10px;
	font-weight:bold;
	cursor:pointer;
	background:#00c3ff;
	color:black;
	transition:0.12s;
	min-width:80px;
}

.upgrade button:hover{
	transform:scale(1.05);
}

.upgrade button:disabled{
	background:#333;
	color:#777;
	cursor:not-allowed;
	transform:none;
}

#prestigeBtn{
	width:100%;
	margin-top:10px;
	padding:14px;
	border:none;
	border-radius:14px;
	font-size:18px;
	font-weight:bold;
	cursor:pointer;
	background:linear-gradient(135deg,#ffcc00,#ff6600);
	color:black;
	transition:0.15s;
}

#prestigeBtn:hover{
	transform:translateY(-2px);
}

.floating{
	position:absolute;
	font-weight:bold;
	color:#00ff99;
	pointer-events:none;
	animation:floatUp 1s linear forwards;
	text-shadow:0 0 10px rgba(0,255,153,0.7);
}

@keyframes floatUp{
	0%{
		opacity:1;
		transform:translateY(0) scale(1);
	}
	100%{
		opacity:0;
		transform:translateY(-70px) scale(1.5);
	}
}
</style>
</head>
<body>

<div id="game">

	<h1>Ultimate Clicker</h1>

	<div id="points">0</div>

	<div class="stats">
		<div class="stat">
			<div class="label">Click Power</div>
			<div class="value" id="clickPowerText">1</div>
		</div>

		<div class="stat">
			<div class="label">Auto / Sec</div>
			<div class="value" id="autoPowerText">0</div>
		</div>
	</div>

	<button id="clickBtn">CLICK</button>

	<div class="shop">

		<h2>Shop</h2>

		<div class="upgrade">
			<div class="upgrade-info">
				<strong>Click Upgrade</strong>
				<p>Increase click power</p>
			</div>

			<button id="clickUpgradeBtn">10</button>
		</div>

		<div class="upgrade">
			<div class="upgrade-info">
				<strong>Auto Clicker</strong>
				<p>Earn points automatically</p>
			</div>

			<button id="autoUpgradeBtn">25</button>
		</div>

		<div class="upgrade">
			<div class="upgrade-info">
				<strong>Multiplier</strong>
				<p>Double all click power</p>
			</div>

			<button id="multiUpgradeBtn">100</button>
		</div>

	</div>

	<button id="prestigeBtn">PRESTIGE</button>

</div>

<script>
const pointsText = document.getElementById("points")
const clickPowerText = document.getElementById("clickPowerText")
const autoPowerText = document.getElementById("autoPowerText")

const clickBtn = document.getElementById("clickBtn")

const clickUpgradeBtn = document.getElementById("clickUpgradeBtn")
const autoUpgradeBtn = document.getElementById("autoUpgradeBtn")
const multiUpgradeBtn = document.getElementById("multiUpgradeBtn")

let points = 0
let clickPower = 1
let autoPower = 0
let prestige = 0

let clickCost = 10
let autoCost = 25
let multiCost = 100

function format(num){
	return Math.floor(num).toLocaleString()
}

function updateUI(){
	pointsText.innerText = format(points)

	clickPowerText.innerText = format(clickPower)
	autoPowerText.innerText = format(autoPower)

	clickUpgradeBtn.innerText = format(clickCost)
	autoUpgradeBtn.innerText = format(autoCost)
	multiUpgradeBtn.innerText = format(multiCost)

	clickUpgradeBtn.disabled = points < clickCost
	autoUpgradeBtn.disabled = points < autoCost
	multiUpgradeBtn.disabled = points < multiCost
}

function floatingText(x,y,text){
	const div = document.createElement("div")

	div.className = "floating"
	div.innerText = text

	div.style.left = x + "px"
	div.style.top = y + "px"

	document.body.appendChild(div)

	setTimeout(()=>{
		div.remove()
	},1000)
}

clickBtn.addEventListener("click",(e)=>{
	const gain = clickPower + prestige

	points += gain

	floatingText(
		e.clientX,
		e.clientY,
		"+" + gain
	)

	updateUI()
})

clickUpgradeBtn.addEventListener("click",()=>{
	if(points >= clickCost){

		points -= clickCost

		clickPower += 1

		clickCost = Math.floor(clickCost * 1.5)

		updateUI()
	}
})

autoUpgradeBtn.addEventListener("click",()=>{
	if(points >= autoCost){

		points -= autoCost

		autoPower += 1

		autoCost = Math.floor(autoCost * 1.6)

		updateUI()
	}
})

multiUpgradeBtn.addEventListener("click",()=>{
	if(points >= multiCost){

		points -= multiCost

		clickPower *= 2

		multiCost = Math.floor(multiCost * 2.2)

		updateUI()
	}
})

document.getElementById("prestigeBtn").addEventListener("click",()=>{

	if(points >= 10000){

		prestige += 1

		points = 0
		clickPower = 1
		autoPower = 0

		clickCost = 10
		autoCost = 25
		multiCost = 100

		updateUI()
	}
})

setInterval(()=>{

	points += autoPower + prestige

	updateUI()

},1000)

updateUI()
</script>

</body>
</html>
